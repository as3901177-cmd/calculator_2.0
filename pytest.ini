# ============================================================================
# pytest.ini
# Конфигурация pytest для CAD Analyzer Pro v24.0
# ============================================================================

[pytest]

# Минимальная версия pytest
minversion = 7.0

# Поиск тестов
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Опции запуска
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    -ra
    --color=yes
    --showlocals
    --durations=10

# Маркеры для категоризации тестов
markers =
    basic: Базовые геометрические фигуры (круг, квадрат, треугольник)
    complex: Сложные детали с отверстиями и вырезами
    slow: Медленные тесты (>5 секунд, стресс-тесты)
    integration: Интеграционные тесты полного цикла
    unit: Unit-тесты отдельных компонентов
    smoke: Smoke-тесты для быстрой проверки

# Фильтрация предупреждений (только от библиотек)
filterwarnings =
    ignore::DeprecationWarning:matplotlib.*
    ignore::UserWarning:matplotlib.*
    ignore::DeprecationWarning:streamlit.*
    ignore::FutureWarning:streamlit.*
    ignore::DeprecationWarning:numpy.*
    ignore::DeprecationWarning:ezdxf.*
    ignore::DeprecationWarning:shapely.*
    ignore::FutureWarning:pandas.*

# Логирование
log_cli = false
log_cli_level = WARNING
log_file = tests/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Кэширование для ускорения повторных запусков
cache_dir = .pytest_cache
